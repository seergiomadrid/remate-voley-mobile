<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>RemateVoley · Panel</title>
<style>
  :root{
    --bg:#F4F6FB; --bg2:#EBEFF6;
    --surface:#FFFFFF; --surface2:#F4F6FB; --raise:#FFFFFF;
    --hair:rgba(17,27,46,.08); --hair2:rgba(17,27,46,.15);
    --text:#141C2E; --muted:#5D6B86; --faint:#94A0B6;
    --spike:#F8623A; --spike2:#FF8A3D;
    --chain:#0FAE9F; --violet:#6A5BE0;
    --good:#15A65B; --warn:#E08A00; --bad:#E5484D;
    --r:22px; --r-sm:14px;
    --shadow:0 10px 30px -14px rgba(17,27,46,.18);
    --shadow-sm:0 4px 14px -8px rgba(17,27,46,.16);
    --mono:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;}
  body{background:
     radial-gradient(120% 80% at 88% -8%, rgba(248,98,58,.10), transparent 52%),
     radial-gradient(90% 70% at -10% 2%, rgba(15,174,159,.08), transparent 48%),
     var(--bg);
     background-attachment:fixed; min-height:100vh;}
  .wrap{max-width:760px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 16px 80px;}
  .num{font-variant-numeric:tabular-nums;}

  /* top bar */
  .top{display:flex;align-items:center;gap:12px;padding:6px 2px 18px;}
  .logo{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--spike),var(--spike2));
    display:grid;place-items:center;font-size:20px;box-shadow:0 8px 20px -6px rgba(255,106,61,.6);}
  .top h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.2px;}
  .top .sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .top .spacer{flex:1;}
  .iconbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--hair);background:var(--surface);
    color:var(--text);display:grid;place-items:center;cursor:pointer;font-size:16px;}
  .iconbtn:hover{border-color:var(--hair2);}

  /* session selector */
  .picker{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 14px;scrollbar-width:none;}
  .picker::-webkit-scrollbar{display:none;}
  .pill{flex:0 0 auto;padding:9px 14px;border-radius:999px;border:1px solid var(--hair);background:var(--surface);
    color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .pill.active{background:linear-gradient(135deg,var(--spike),var(--spike2));color:#1a0d06;border-color:transparent;}
  .pill .d{font-size:11px;opacity:.8;font-weight:500;}

  /* config */
  .config{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:20px;margin-bottom:16px;}
  .config label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;margin:0 0 6px;}
  .config input{width:100%;background:var(--bg2);border:1px solid var(--hair);border-radius:12px;padding:11px 13px;color:var(--text);font:inherit;margin-bottom:12px;}
  .btn{font:inherit;cursor:pointer;border:none;border-radius:12px;padding:11px 18px;font-weight:700;
    background:linear-gradient(135deg,var(--spike),var(--spike2));color:#1a0d06;}
  .btn.ghost{background:var(--surface);color:var(--text);border:1px solid var(--hair);}

  /* hero */
  .hero{position:relative;background:
      linear-gradient(160deg, rgba(248,98,58,.13), rgba(255,138,61,.04) 55%), var(--surface);
    border:1px solid var(--hair);border-radius:26px;padding:20px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow);}
  .hero .glow{position:absolute;right:-40px;top:-50px;width:200px;height:200px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,106,61,.35),transparent 70%);filter:blur(8px);}
  .hero-row{display:flex;align-items:center;gap:18px;position:relative;}
  .verdict-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.5px;
    text-transform:uppercase;padding:5px 10px;border-radius:999px;}
  .hero h2{margin:10px 0 2px;font-size:21px;font-weight:800;letter-spacing:-.3px;line-height:1.2;}
  .hero p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.5;}
  .hero-meta{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;position:relative;}
  .meta-chip{font-size:12px;color:var(--muted);background:rgba(17,27,46,.04);border:1px solid var(--hair);border-radius:10px;padding:6px 10px;}
  .meta-chip b{color:var(--text);font-weight:700;}

  /* section heading */
  .sec{margin:22px 2px 12px;display:flex;align-items:baseline;gap:8px;}
  .sec h3{font-size:15px;margin:0;font-weight:800;letter-spacing:-.2px;}
  .sec .hint{font-size:12px;color:var(--faint);}

  /* metric cards grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:480px){.grid{grid-template-columns:1fr;}}
  .mcard{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);}
  .mcard .top-line{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .mcard .m-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;}
  .mcard .m-val{font-size:30px;font-weight:850;letter-spacing:-1px;margin-top:8px;line-height:1;}
  .mcard .m-unit{font-size:14px;color:var(--muted);font-weight:600;margin-left:3px;}
  .mcard .m-mean{font-size:12px;color:var(--faint);margin-top:4px;}
  .chip{font-size:10.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:4px 8px;border-radius:8px;}
  .m-explain{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:11px;padding-top:11px;border-top:1px solid var(--hair);}
  .m-explain b{color:var(--text);}

  /* range bar */
  .range{margin-top:12px;}
  .range-track{height:7px;border-radius:999px;background:var(--bg2);position:relative;overflow:hidden;}
  .range-zone{position:absolute;top:0;bottom:0;border-radius:999px;opacity:.35;}
  .range-fill{position:absolute;top:0;bottom:0;left:0;border-radius:999px;}
  .range-marker{position:absolute;top:-3px;width:3px;height:13px;border-radius:2px;background:#fff;box-shadow:0 0 0 2px var(--bg);}
  .range-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:10.5px;color:var(--faint);}

  /* ring */
  .ring-wrap{display:flex;align-items:center;gap:16px;}
  .ring{position:relative;flex:0 0 auto;}
  .ring .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;}
  .ring .big{font-size:30px;font-weight:850;letter-spacing:-1px;line-height:1;}
  .ring .small{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}

  /* panel/card */
  .card{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
  .card h4{font-size:13px;margin:0 0 3px;font-weight:800;}
  .card .desc{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.5;}

  canvas{width:100%;display:block;border-radius:12px;}
  .legend{display:flex;gap:14px;margin-top:10px;font-size:12px;color:var(--muted);flex-wrap:wrap;}
  .legend i{display:inline-block;width:18px;height:4px;border-radius:2px;margin-right:6px;vertical-align:middle;}
  .legend .dot{width:8px;height:8px;border-radius:50%;}

  /* kinetic chain */
  .kc-rep{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--hair);}
  .kc-rep:first-child{border-top:none;}
  .kc-idx{width:30px;height:30px;border-radius:10px;background:var(--bg2);display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--muted);flex:0 0 auto;}
  .kc-track{flex:1;height:30px;position:relative;background:var(--bg2);border-radius:9px;overflow:hidden;}
  .kc-ideal{position:absolute;top:0;bottom:0;background:rgba(54,211,153,.13);}
  .kc-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--hair2);}
  .kc-bar{position:absolute;top:6px;height:18px;border-radius:6px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:700;}
  .kc-val{flex:0 0 auto;width:70px;text-align:right;font-size:13px;font-weight:800;}

  /* rep analysis cards */
  .rep{background:var(--surface);border:1px solid var(--hair);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);}
  .rep-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .rep-no{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-weight:850;font-size:15px;
    background:linear-gradient(135deg,rgba(255,106,61,.25),rgba(255,162,75,.15));color:var(--spike2);flex:0 0 auto;}
  .rep-title{font-weight:800;font-size:14px;}
  .rep-sub{font-size:12px;color:var(--faint);}
  .rep-stats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .rstat{background:var(--bg2);border:1px solid var(--hair);border-radius:10px;padding:7px 10px;min-width:74px;}
  .rstat .rk{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;}
  .rstat .rv{font-size:15px;font-weight:800;margin-top:2px;}
  .rep-note{font-size:13px;color:var(--muted);line-height:1.55;background:var(--bg2);border-radius:11px;padding:10px 12px;border-left:3px solid var(--spike);}

  /* tips / focus */
  .focus{background:linear-gradient(160deg,rgba(106,91,224,.10),var(--surface) 60%);border:1px solid var(--hair);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
  .focus .ft{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--violet);font-weight:800;}
  .focus h4{margin:6px 0 4px;font-size:17px;font-weight:850;}
  .focus p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.55;}
  .tip{display:flex;gap:11px;padding:12px 0;border-top:1px solid var(--hair);}
  .tip:first-child{border-top:none;}
  .tip-ic{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:16px;flex:0 0 auto;}
  .tip-cat{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:700;}
  .tip-msg{font-size:13.5px;line-height:1.5;margin-top:2px;}

  .banner{background:rgba(21,166,91,.10);border:1px solid rgba(21,166,91,.3);color:#0d7a44;
    border-radius:14px;padding:11px 14px;font-size:13px;font-weight:600;}
  .cap-note{color:var(--faint);font-size:11.5px;line-height:1.45;margin-top:13px;padding-top:11px;border-top:1px solid var(--hair);position:relative;}
  .comp-row{display:flex;gap:12px;margin-bottom:11px;}
  .comp{flex:1;min-width:0;}
  .comp-label{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
  .comp-track{height:5px;border-radius:999px;background:var(--bg2);overflow:hidden;}
  .comp-fill{height:5px;border-radius:999px;}
  .comp-val{font-size:12px;font-weight:800;margin-top:3px;}
  .apex{margin-top:6px;}
  .apex-track{height:10px;border-radius:999px;background:var(--bg2);position:relative;}
  .apex-ideal{position:absolute;left:35%;width:30%;top:0;bottom:0;background:rgba(21,166,91,.25);border-radius:999px;}
  .apex-mark{position:absolute;top:-4px;width:4px;height:18px;border-radius:2px;background:var(--violet);margin-left:-2px;box-shadow:0 0 0 2px #fff;}
  .apex-labels{display:flex;justify-content:space-between;margin-top:7px;font-size:10.5px;color:var(--faint);}
  .empty{color:var(--faint);text-align:center;padding:60px 20px;font-size:14px;}
  .err{color:var(--bad);font-size:13px;}
  .center-load{text-align:center;padding:50px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">🏐</div>
    <div>
      <h1>RemateVoley</h1>
      <div class="sub" id="topsub">Análisis de remate</div>
    </div>
    <div class="spacer"></div>
    <button class="iconbtn" onclick="loadList()" title="Actualizar">↻</button>
    <button class="iconbtn" onclick="forgetConfig()" title="Cambiar proyecto">⚙</button>
  </div>

  <div id="config" class="config" hidden>
    <label>URL del proyecto Supabase</label>
    <input id="cfgUrl" placeholder="https://xxxx.supabase.co" autocomplete="off" />
    <label>Clave pública (anon / publishable)</label>
    <input id="cfgKey" placeholder="sb_publishable_… o eyJ…" autocomplete="off" />
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <button class="btn" onclick="saveConfig()">Conectar</button>
      <span style="color:var(--muted);font-size:12.5px">Se guarda solo en este navegador.</span>
    </div>
    <div id="cfgErr" class="err" style="margin-top:8px"></div>
  </div>

  <div id="picker" class="picker" hidden></div>
  <div id="view"></div>
</div>

<script>
const LS_URL="rv_supabase_url", LS_KEY="rv_supabase_key";
const DEFAULT_URL="https://jbwdhkcbyxqoeqgwxcdy.supabase.co";
const DEFAULT_KEY="sb_publishable_i0Ejy43YRsWmjxamqE8CPQ_YUqL-O0A";
let cfg={url:localStorage.getItem(LS_URL)||DEFAULT_URL,key:localStorage.getItem(LS_KEY)||DEFAULT_KEY};
let sessions=[], current=null;

// Sesión de demostración integrada (para ver el diseño sin subir nada).
const DEMO_PAYLOAD=(function(){
  const t=[],g=[],ac=[];
  for(let i=0;i<140;i++){let v=120+70*Math.sin(i*0.7)*Math.random();
    [[28,1550],[60,895],[95,2484],[125,2719]].forEach(([c,h])=>{v+=h*Math.exp(-Math.pow((i-c)/5,2));});
    g.push(Math.max(40,v));t.push(i*45);ac.push(1+Math.random()*2);}
  const torsoG=g.map(v=>v*0.18+50*Math.random());
  return {startedAtMs:Date.now()-86400000,clockOffsetMs:127,
    aggregates:{repCount:4,armPeakBestDps:2719,armPeakMeanDps:1912,armConsistencyCvPct:44,sequencingOkPct:0,sequencingMeanLagMs:18,load:7.6,fatigueDropPct:10,qualityIndex:55,jumpBestCm:null},
    tips:[{category:"Secuenciación",message:"Ningún remate sigue el orden tronco→brazo. Inicia el golpe desde la rotación del tronco y deja que el brazo lo siga.",severity:"bad"},
          {category:"Consistencia",message:"Tus picos varían un 44%. Repite la misma carrera y armado en cada remate.",severity:"warn"},
          {category:"Potencia",message:"Gran pico máximo (2719°/s), saturando el sensor en los remates fuertes.",severity:"good"}],
    reps:[{index:0,timeMs:18000,armPeakDps:1550,armEstPeakDps:1550,armSaturated:false,armTimeToPeakMs:300,armShape:"intermedio",torsoPeakDps:347,lagMs:-5,sequencingOk:false,jumpHeightCm:31,flightTimeS:0.50,contactInFlightPct:38},
      {index:1,timeMs:41000,armPeakDps:1495,armEstPeakDps:1495,armSaturated:false,armTimeToPeakMs:280,armShape:"empuje",torsoPeakDps:231,lagMs:-40,sequencingOk:false,jumpHeightCm:28,flightTimeS:0.48,contactInFlightPct:33},
      {index:2,timeMs:66000,armPeakDps:2484,armEstPeakDps:2610,armSaturated:true,armTimeToPeakMs:150,armShape:"latigazo",torsoPeakDps:311,lagMs:-80,sequencingOk:false,jumpHeightCm:35,flightTimeS:0.53,contactInFlightPct:47},
      {index:3,timeMs:92000,armPeakDps:2719,armEstPeakDps:2860,armSaturated:true,armTimeToPeakMs:140,armShape:"latigazo",torsoPeakDps:436,lagMs:55,sequencingOk:true,jumpHeightCm:37,flightTimeS:0.55,contactInFlightPct:51}],
    traces:{arm:{t,gyro:g,acc:ac,peaks:[28,60,95,125]},torso:{t,gyro:torsoG,acc:ac,peaks:[28,60,95,125]}}};
})();
const DEMO_ENTRY={id:"demo",name:"Demo",created_at:new Date(Date.now()-86400000).toISOString()};

const $=id=>document.getElementById(id);
const show=(id,on)=>{$(id).hidden=!on;};

function init(){ if(cfg.url&&cfg.key){ show("config",false); loadList(); } else show("config",true); }

function saveConfig(){
  const url=$("cfgUrl").value.trim().replace(/\/+$/,""), key=$("cfgKey").value.trim();
  if(!url.includes("supabase.co")||key.length<20){$("cfgErr").textContent="Revisa la URL y la clave.";return;}
  cfg={url,key}; localStorage.setItem(LS_URL,url); localStorage.setItem(LS_KEY,key);
  show("config",false); loadList();
}
function forgetConfig(){ localStorage.removeItem(LS_URL);localStorage.removeItem(LS_KEY);cfg={url:"",key:""};
  show("picker",false);$("view").innerHTML="";$("cfgUrl").value="";$("cfgKey").value="";show("config",true);}

async function api(path){
  const r=await fetch(cfg.url+"/rest/v1/"+path,{headers:{apikey:cfg.key,Authorization:"Bearer "+cfg.key}});
  if(!r.ok) throw new Error("Error "+r.status+": "+(await r.text().catch(()=>"")));
  return r.json();
}

async function loadList(){
  $("view").innerHTML='<div class="center-load">Cargando…</div>';
  try{
    const real=await api("sessions?select=id,name,created_at,started_at,rep_count,quality_index,arm_peak_best_dps,sequencing_ok_pct,session_load&order=created_at.desc");
    // Filtra la fila de prueba con payload incompleto; añade la Demo al final.
    const clean=real.filter(s=>s.rep_count>0||(s.quality_index>0));
    sessions=[...clean, DEMO_ENTRY];
    $("topsub").textContent=clean.length?clean.length+" sesiones guardadas":"Demo · sube tu primera sesión";
    renderPicker();
    openSession(sessions[0].id);
  }catch(e){ show("picker",false); $("view").innerHTML='<div class="empty err">'+e.message+'</div>'; }
}

function renderPicker(){
  show("picker",true);
  $("picker").innerHTML=sessions.map(s=>`
    <button class="pill ${current===s.id?'active':''}" data-id="${s.id}" onclick="openSession('${s.id}')">
      ${escapeHtml(s.name||'Sesión')} <span class="d">· ${new Date(s.created_at).toLocaleDateString()}</span>
    </button>`).join("");
}

async function openSession(id){
  current=id; renderPicker();
  if(id==="demo"){ renderSession("Demo · remate de ejemplo", DEMO_PAYLOAD); window.scrollTo(0,0); return; }
  $("view").innerHTML='<div class="center-load">Cargando sesión…</div>';
  try{
    const rows=await api("sessions?id=eq."+id+"&select=name,created_at,payload");
    if(!rows.length){ $("view").innerHTML='<div class="empty">No encontrada.</div>'; return; }
    renderSession(rows[0].name, rows[0].payload); window.scrollTo(0,0);
  }catch(e){ $("view").innerHTML='<div class="empty err">'+e.message+'</div>'; }
}

/* ---------- análisis en lenguaje claro ---------- */
/* Veredictos ESTRICTOS (escala élite: los umbrales son de jugador profesional). */
function verdict(kind,v){
  if(v==null||isNaN(v)) return {key:"na",label:"—",color:"var(--faint)"};
  let k;
  if(kind==="quality") k = v>=75?"good":v>=50?"warn":"bad";
  else if(kind==="seq") k = v>=70?"good":v>=40?"warn":"bad";
  else if(kind==="cv")  k = v<=8?"good":v<=18?"warn":"bad";
  else if(kind==="ttp") k = v<=100?"good":v<=160?"warn":"bad";
  else if(kind==="peak") k = v>=2600?"good":v>=1800?"warn":"bad";
  else k="warn";
  const colors={good:"var(--good)",warn:"var(--warn)",bad:"var(--bad)"};
  if(kind==="quality"){
    const label=v>=90?"Élite":v>=75?"Alto nivel":v>=60?"Sólido":v>=45?"En construcción":"A trabajar";
    return {key:k,label,color:colors[k]};
  }
  if(kind==="peak"){
    return {key:k,label:k==="good"?"Nivel élite":k==="warn"?"Potente":"Mejorable",color:colors[k]};
  }
  const labels={good:"Bien",warn:"Mejorable",bad:"A trabajar"};
  return {key:k,label:labels[k],color:colors[k]};
}
function chipStyle(c){return `color:${c};background:${c.replace('var(','rgba(').replace(')','')}`;} // fallback
function tone(c){ // returns bg tint for a css var color (tema claro)
  const map={
    "var(--good)":"rgba(21,166,91,.12)","var(--warn)":"rgba(224,138,0,.14)",
    "var(--bad)":"rgba(229,72,77,.12)","var(--faint)":"rgba(148,160,182,.16)",
    "var(--violet)":"rgba(106,91,224,.12)","var(--spike)":"rgba(248,98,58,.12)"};
  return map[c]||"rgba(17,27,46,.06)";
}

/* ---------- modelo de calidad ÉLITE (mismas curvas que el motor core) ----------
   100 = remate de jugador profesional. Componentes NO medidos capan la nota. */
function piecewise(x,anchors){
  if(x<=anchors[0][0]) return anchors[0][1];
  for(let i=1;i<anchors.length;i++){
    const [x1,y1]=anchors[i],[x0,y0]=anchors[i-1];
    if(x<=x1) return y0+((x-x0)/(x1-x0))*(y1-y0);
  }
  return anchors[anchors.length-1][1];
}
const c01=v=>Math.max(0,Math.min(100,v));
const scorePower=d=>c01(piecewise(d,[[500,0],[900,12],[1300,30],[1700,50],[2000,63],[2300,74],[2600,86],[2800,94],[3000,100]]));
const scoreChainLag=l=>c01(piecewise(l,[[-100,0],[-30,0],[0,25],[10,50],[30,85],[40,100],[90,100],[130,70],[180,35],[250,0]]));
const scoreTorsoMag=d=>c01(piecewise(d,[[0,0],[150,12],[300,38],[450,58],[600,78],[750,92],[900,100]]));
const scoreExplosive=t=>c01(piecewise(t,[[60,100],[90,88],[120,70],[160,45],[220,20],[300,0]]));
const scoreJumpTiming=p=>c01(piecewise(p,[[10,0],[25,35],[38,80],[45,97],[47,100],[53,100],[55,97],[62,80],[75,35],[90,0]]));
const scoreConsistency=cv=>c01(piecewise(cv,[[4,100],[8,90],[12,75],[18,55],[25,35],[35,10],[45,0]]));
const W={power:.35,chain:.30,explosive:.15,jumpTiming:.20};

function scorePayloadRep(r){
  if(r.score) return r.score; // sesiones nuevas ya traen la nota del motor
  const est=r.armEstPeakDps??r.armPeakDps;
  const power=scorePower(est);
  const chain=(r.lagMs!=null&&r.torsoPeakDps!=null)?0.6*scoreChainLag(r.lagMs)+0.4*scoreTorsoMag(r.torsoPeakDps):null;
  const explosive=(r.armTimeToPeakMs!=null&&isFinite(r.armTimeToPeakMs))?scoreExplosive(r.armTimeToPeakMs):null;
  const jumpTiming=r.contactInFlightPct!=null?scoreJumpTiming(r.contactInFlightPct):null;
  let raw=0,capMax=0,weakest=null,weakestScore=Infinity;
  for(const [k,s] of [["power",power],["chain",chain],["explosive",explosive],["jumpTiming",jumpTiming]]){
    if(s==null) continue;
    raw+=W[k]*s; capMax+=W[k]*100;
    if(s<weakestScore){weakestScore=s;weakest=k;}
  }
  const sc={total:Math.round(Math.min(raw,capMax)),capMax:Math.round(capMax),
    power:Math.round(power),chain:chain!=null?Math.round(chain):null,
    explosive:explosive!=null?Math.round(explosive):null,jumpTiming:jumpTiming!=null?Math.round(jumpTiming):null,
    weakest,advice:""};
  sc.advice=adviceFor(r,sc);
  return sc;
}

function adviceFor(r,s){
  const missing=[];
  if(s.chain==null) missing.push("tronco");
  if(s.jumpTiming==null) missing.push("salto");
  const parts=[];
  switch(s.weakest){
    case "power":
      parts.push(`Pico de ${Math.round(r.armEstPeakDps??r.armPeakDps)} °/s: lejos del rango élite (≥2600). Trabaja el latigazo final de antebrazo y muñeca.`);
      break;
    case "chain":
      if(r.lagMs!=null&&r.lagMs<10) parts.push(`El brazo llegó ${r.lagMs<=0?"antes que":"casi a la vez que"} el tronco (${Math.round(r.lagMs)} ms): golpeas "solo de brazo". Inicia la rotación del tronco antes.`);
      else if(r.lagMs!=null&&r.lagMs>130) parts.push(`El brazo tardó ${Math.round(r.lagMs)} ms tras el tronco: la energía del giro se pierde. Encadena el brazo justo después.`);
      else if((r.torsoPeakDps??0)<450) parts.push(`El tronco solo rotó a ${Math.round(r.torsoPeakDps??0)} °/s (élite: 600–900). Genera el golpe desde la cadera y el tronco.`);
      else parts.push("Ajusta el encadenado tronco→brazo hacia un lag de 40–90 ms.");
      break;
    case "explosive":
      parts.push(`Armado lento: ${Math.round(r.armTimeToPeakMs)} ms hasta el pico (élite <100). Gesto corto y explosivo, no empujar.`);
      break;
    case "jumpTiming":{
      const p=r.contactInFlightPct;
      parts.push(p<45?`Golpeas subiendo (${Math.round(p)} % del vuelo): retrasa el golpe hasta el punto más alto.`:`Golpeas cayendo (${Math.round(p)} % del vuelo): adelanta el armado para llegar arriba.`);
      break;
    }
    default:
      if(!missing.length) parts.push("Remate sólido en todos los componentes medidos.");
  }
  if(missing.length) parts.push(`Sin datos de ${missing.join(" y ")}: nota capada a ${s.capMax}.`);
  return parts.join(" ");
}

function strictSession(reps){
  if(!reps.length) return {index:0,capMax:0,repScores:[]};
  const repScores=reps.map(scorePayloadRep);
  const meanRep=avg(repScores.map(s=>s.total));
  const capMax=avg(repScores.map(s=>s.capMax));
  const peaks=reps.map(r=>r.armEstPeakDps??r.armPeakDps);
  const m=avg(peaks);
  const cv=m>0?stddev(peaks)/m*100:100;
  const consistencyScore=reps.length>=3?scoreConsistency(cv):50;
  return {index:Math.min(0.85*meanRep+0.15*consistencyScore,capMax),capMax,repScores};
}

function buildFocus(repScores){
  const meanOf=k=>{const xs=repScores.map(s=>s[k]).filter(v=>v!=null);return xs.length?avg(xs):null;};
  const entries=[
    [{tag:"Foco principal",h:"Secuencia tronco → brazo",p:"Tu cadena cinética es lo que más margen tiene. El tronco debe girar primero y el brazo seguirlo como un látigo (40–90 ms después). Inicia el golpe desde la rotación de cadera y tronco, no desde el hombro."},meanOf("chain")],
    [{tag:"Foco principal",h:"Explosividad del armado",p:"Tu gesto tarda demasiado en llegar al pico. Piensa en un armado corto y un latigazo final rápido: la potencia nace de acelerar el último tramo, no de empujar el balón."},meanOf("explosive")],
    [{tag:"Foco principal",h:"Timing del salto",p:"No estás golpeando en el punto más alto del vuelo. Ajusta la batida y el armado para contactar el balón cerca del 50 % del salto, con el brazo extendido arriba."},meanOf("jumpTiming")],
    [{tag:"Foco principal",h:"Potencia de brazo",p:"Hay margen de velocidad en la muñeca. Trabaja el latigazo final (antebrazo y muñeca) y la transferencia desde el tronco: la élite supera los 2600 °/s."},meanOf("power")],
  ];
  const measured=entries.filter(([,v])=>v!=null);
  if(!measured.length) return {tag:"Datos incompletos",h:"Captura con ambos sensores",p:"No hay componentes suficientes medidos para priorizar. Asegura la conexión de ambos sensores y repite la serie."};
  measured.sort((a,b)=>a[1]-b[1]);
  const [focus,score]=measured[0];
  if(score>=80) return {tag:"Nivel alto",h:"Pulir y consolidar",p:"Tus componentes medidos están a buen nivel. El siguiente salto es la consistencia: repetir este patrón bajo fatiga y en juego real."};
  return focus;
}

/* ---------- reconsolidación de remates (corrige sobreconteo de datos antiguos) ----------
   Mismo criterio que el motor: umbral = max(1100, 0.55·pico_máx) + refractario 3 s. */
function consolidateReps(reps){
  if(!reps.length) return reps;
  const mx=Math.max(...reps.map(r=>r.armPeakDps));
  const thr=Math.max(1100, 0.55*mx);
  const cands=reps.filter(r=>r.armPeakDps>=thr).sort((a,b)=>b.armPeakDps-a.armPeakDps);
  const kept=[];
  for(const r of cands){ if(kept.every(k=>Math.abs(r.timeMs-k.timeMs)>3000)) kept.push(r); }
  kept.sort((a,b)=>a.timeMs-b.timeMs);
  return kept.map((r,i)=>({...r,index:i}));
}
const avg=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
const stddev=a=>{const m=avg(a);return a.length?Math.sqrt(avg(a.map(v=>(v-m)**2))):0;};
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function jumpSection(p){
  const reps=p.reps;
  const jumps=reps.filter(r=>r.jumpHeightCm!=null);
  const timings=reps.map(r=>r.contactInFlightPct).filter(x=>x!=null);
  if(!jumps.length && !timings.length){
    return `<div class="sec"><h3>Salto</h3></div>
      <div class="card"><p class="desc" style="margin:0">No se detectó salto en esta sesión. Si saltas al rematar, una captura nueva te mostrará el <b>tiempo de vuelo</b>, la <b>altura</b> y en qué <b>momento del salto golpeas</b>.</p></div>`;
  }
  const bestCm=jumps.length?Math.max(...jumps.map(r=>r.jumpHeightCm)):null;
  const flights=reps.map(r=>r.flightTimeS).filter(x=>x!=null);
  const meanFlight=flights.length?avg(flights):null;
  const meanTiming=timings.length?avg(timings):null;
  const tv = meanTiming==null?null : Math.abs(meanTiming-50)<=15?{l:'En el punto alto 👌',c:'var(--good)'}:Math.abs(meanTiming-50)<=30?{l:'Algo desfasado',c:'var(--warn)'}:{l:'Lejos del punto alto',c:'var(--bad)'};
  let html=`<div class="sec"><h3>Salto</h3><span class="hint">vuelo y momento del golpe</span></div>`;
  if(bestCm!=null){
    html+=`<div class="grid">${metricCard({label:'Altura de salto',val:Math.round(bestCm),unit:'cm',
      mean:meanFlight!=null?('vuelo '+meanFlight.toFixed(2)+' s'):'',v:{key:'na',label:'Salto',color:'var(--violet)'},
      explain:'Altura estimada por el tiempo de vuelo (h = g·t²/8). Estimación con un solo sensor: úsala como referencia y tendencia.',
      range:{min:0,max:80,a:40,b:80,val:bestCm,zoneColor:'var(--violet)'}})}</div>`;
  }
  if(meanTiming!=null){
    html+=`<div class="card">
      <h4>¿Golpeas en el punto más alto?</h4>
      <p class="desc">Lo ideal es contactar el balón cerca del 50% del vuelo (punto más alto). Así pegas con el brazo más extendido y arriba.</p>
      <div class="apex"><div class="apex-track"><div class="apex-ideal"></div><div class="apex-mark" style="left:${clamp(meanTiming,0,100)}%"></div></div>
        <div class="apex-labels"><span>despegue</span><span>punto alto</span><span>aterrizaje</span></div></div>
      <div style="margin-top:12px;font-weight:800;color:${tv.c};font-size:15px">${Math.round(meanTiming)}% · ${tv.l}</div>
    </div>`;
  }
  return html;
}

/* ---------- render principal ---------- */
function renderSession(name,p){
  if(!p||!p.aggregates||!p.reps||!p.traces){
    $("view").innerHTML='<div class="empty">Esta sesión no tiene datos completos para mostrar.<br>Sube una sesión real desde la app.</div>'; return;
  }
  // Corrige sesiones antiguas con sobreconteo.
  let fixNote="";
  const cons=consolidateReps(p.reps);
  if(cons.length>0 && cons.length < p.reps.length*0.6){
    fixNote=`Detección corregida: ${p.reps.length} → ${cons.length} remates reales (recalculado).`;
    p={...p, reps:cons};
  }
  // Índice ESTRICTO (escala élite) recalculado siempre sobre los remates mostrados.
  const strict=strictSession(p.reps);
  const quality=strict.index, capMax=strict.capMax, repScores=strict.repScores;
  const peaks=p.reps.map(r=>r.armEstPeakDps??r.armPeakDps);
  const bestPeak=peaks.length?Math.max(...peaks):0;
  const meanPeak=avg(peaks);
  const mCv=meanPeak>0?stddev(peaks)/meanPeak*100:0;
  const paired=p.reps.filter(r=>r.lagMs!=null);
  const seqOkPct=paired.length?paired.filter(r=>r.sequencingOk).length/paired.length*100:0;
  const meanLag=paired.length?avg(paired.map(r=>r.lagMs)):null;

  const qv=verdict("quality",quality);
  const peakv=verdict("peak",bestPeak);
  const seqv=verdict("seq",seqOkPct);
  const cvv=verdict("cv",mCv);
  const ttp = avgTtp(p);
  const ttpv=verdict("ttp",ttp);
  const sat = p.reps.filter(r=>r.armSaturated).length;
  const seqN = paired.length; // remates con dato de tronco
  const focus=buildFocus(repScores);
  const qVerdictText = quality>=90?"Nivel élite en lo medido. Excepcional."
    :quality>=75?"Remate de alto nivel. Pule los detalles."
    :quality>=60?"Base sólida con margen claro en componentes concretos."
    :quality>=45?"En construcción: hay déficits técnicos medibles que corregir."
    :"Lejos aún del patrón objetivo. Trabaja los focos indicados.";
  const capNote = capMax<99
    ? `Índice capado a ${Math.round(capMax)}: hay componentes sin medir (tronco o salto). Escala élite: 100 = remate profesional.`
    : "Escala élite: 100 = remate de jugador profesional en todos los componentes.";

  $("view").innerHTML=`
    <div class="hero">
      <div class="glow"></div>
      <div class="hero-row">
        ${ringSVG(quality,100,86,qv.color,Math.round(quality),"Calidad")}
        <div style="flex:1;min-width:0">
          <span class="verdict-tag" style="color:${qv.color};background:${tone(qv.color)}">${qv.label}</span>
          <h2>${escapeHtml(name)}</h2>
          <p>${qVerdictText}</p>
        </div>
      </div>
      <div class="hero-meta">
        <span class="meta-chip"><b>${p.reps.length}</b> remates</span>
        <span class="meta-chip">📅 ${new Date(p.startedAtMs).toLocaleDateString()}</span>
        <span class="meta-chip">⚡ pico <b class="num">${Math.round(bestPeak)}</b>°/s${sat?' est.':''}</span>
        ${sat?`<span class="meta-chip" style="color:var(--warn)">▲ ${sat} ${sat>1?'saturaron':'saturó'}</span>`:''}
      </div>
      <div class="cap-note">${capNote}</div>
    </div>

    ${fixNote?`<div class="banner">✓ ${fixNote}</div>`:''}

    <div class="focus">
      <div class="ft">${focus.tag}</div>
      <h4>${focus.h}</h4>
      <p>${focus.p}</p>
    </div>

    ${jumpSection(p)}

    <div class="sec"><h3>Tus métricas</h3><span class="hint">escala élite: 100 = profesional</span></div>
    <div class="grid">
      ${metricCard({label:"Potencia de brazo",val:Math.round(bestPeak),unit:"°/s",mean:"media "+Math.round(meanPeak)+"°/s"+(sat?" (est., saturó)":""),
        v:peakv,
        explain:"Velocidad de giro de la muñeca en el golpe. <b>Élite: 2600–3000 °/s.</b>"+(sat?" Los picos saturados se extrapolan por la forma del recorte.":""),
        range:{min:500,max:3000,a:2300,b:3000,val:bestPeak,zoneColor:"var(--good)"}})}

      ${seqN>=2
        ? metricCard({label:"Secuencia tronco→brazo",val:Math.round(seqOkPct),unit:"%",mean:"lag medio "+(meanLag!=null?Math.round(meanLag):"—")+" ms",
            v:seqv, explain:"Qué % de remates siguen el orden correcto: <b>el tronco gira y el brazo lo sigue como un látigo</b> (ideal 40–90 ms después).",
            range:{min:0,max:100,a:60,b:100,val:seqOkPct,zoneColor:"var(--good)"}})
        : metricCard({label:"Secuencia tronco→brazo",val:"—",unit:"",mean:"datos de tronco insuficientes",
            v:{key:"na",label:"Recaptura",color:"var(--faint)"}, explain:"Esta sesión no tiene suficientes datos de tronco emparejados. Captura una serie nueva con ambos sensores conectados para medir la cadena cinética.",
            range:{min:0,max:100,a:60,b:100,val:0,zoneColor:"var(--faint)"}})}

      ${metricCard({label:"Consistencia",val:Math.round(mCv),unit:"%",mean:"variación entre remates",
        v:cvv, explain:"Cuánto varían tus picos entre remates (CV). <b>Élite: ≤8 %</b>. La regularidad es la base para mejorar.",
        range:{min:0,max:50,a:0,b:8,val:mCv,zoneColor:"var(--good)",invert:true}})}

      ${metricCard({label:"Explosividad",val:Math.round(ttp),unit:"ms",mean:"tiempo hasta el pico",
        v:ttpv, explain:"Cuánto tardas en alcanzar la máxima velocidad. <b>Élite: <100 ms</b>. Gesto tipo látigo, no empuje.",
        range:{min:50,max:300,a:50,b:100,val:ttp,zoneColor:"var(--good)",invert:true}})}
    </div>

    <div class="sec"><h3>Velocidad angular del gesto</h3></div>
    <div class="card">
      <p class="desc">Cada pico es un remate. La línea naranja es tu muñeca; la turquesa, el tronco. La franja roja marca el límite del sensor (2000°/s).</p>
      <canvas id="chart"></canvas>
      <div class="legend">
        <span><i style="background:var(--spike)"></i>Brazo (muñeca)</span>
        ${p.traces.torso?'<span><i style="background:var(--chain)"></i>Tronco</span>':''}
        <span><i style="background:rgba(255,107,107,.6)"></i>Saturación</span>
      </div>
    </div>

    ${renderKineticChain(p)}

    <div class="sec"><h3>Remate a remate</h3><span class="hint">nota y consejo de cada uno</span></div>
    ${p.reps.map((r,i)=>renderRep(r,repScores[i])).join("")}

    ${!fixNote && p.tips && p.tips.length ? `<div class="sec"><h3>Consejos</h3></div>
    <div class="card">
      ${p.tips.map(t=>{
        const ic=t.severity==="good"?"✅":t.severity==="warn"?"⚠️":"🎯";
        const col=t.severity==="good"?"var(--good)":t.severity==="warn"?"var(--warn)":"var(--violet)";
        return `<div class="tip"><div class="tip-ic" style="background:${tone(col)};">${ic}</div>
          <div><div class="tip-cat">${escapeHtml(t.category)}</div><div class="tip-msg">${escapeHtml(t.message)}</div></div></div>`;
      }).join("")}
    </div>` : ''}
  `;
  drawChart(p.traces);
}

function avgTtp(p){
  const xs=p.reps.map(r=>r.armTimeToPeakMs).filter(v=>v!=null&&!isNaN(v));
  return xs.length?xs.reduce((s,v)=>s+v,0)/xs.length:0;
}

function metricCard(o){
  const c=o.v.color;
  return `<div class="mcard">
    <div class="top-line">
      <span class="m-label">${o.label}</span>
      <span class="chip" style="color:${c};background:${tone(c)}">${o.v.label}</span>
    </div>
    <div class="m-val num">${o.val}<span class="m-unit">${o.unit}</span></div>
    <div class="m-mean num">${o.mean}</div>
    ${rangeBar(o.range)}
    <div class="m-explain">${o.explain}</div>
  </div>`;
}

function rangeBar(rg){
  const span=rg.max-rg.min;
  const pct=v=>Math.max(0,Math.min(100,((v-rg.min)/span)*100));
  const zoneL=pct(rg.a), zoneW=pct(rg.b)-pct(rg.a);
  const mark=pct(rg.val);
  const fillColor=rg.zoneColor;
  return `<div class="range">
    <div class="range-track">
      <div class="range-zone" style="left:${zoneL}%;width:${zoneW}%;background:${fillColor}"></div>
      <div class="range-marker" style="left:calc(${mark}% - 1px)"></div>
    </div>
    <div class="range-labels"><span>${rg.invert?'ideal':rg.min}</span><span>${rg.invert?'':'ideal'} ${rg.invert?'◀':'▶'}</span></div>
  </div>`;
}

function renderKineticChain(p){
  const paired=p.reps.filter(r=>r.lagMs!=null);
  if(paired.length<2) return "";
  const maxL=Math.max(220,...paired.map(r=>Math.abs(r.lagMs)));
  const pct=v=>Math.max(0,Math.min(100,(Math.abs(v)/maxL)*46));
  // ideal zone +10..+150 ms a la derecha del centro
  const idealL=50, idealW=(150/maxL)*46;
  return `<div class="sec"><h3>Cadena cinética</h3><span class="hint">tronco → brazo</span></div>
  <div class="card">
    <p class="desc">El tronco debe girar <b>antes</b> que el brazo. Verde = orden correcto (tronco lidera 10–150 ms). A la izquierda del centro, el brazo se adelantó.</p>
    ${paired.map(r=>{
      const ok=r.sequencingOk, c=ok?"var(--good)":"var(--bad)";
      const w=pct(r.lagMs), pos=r.lagMs>=0?50:50-w;
      return `<div class="kc-rep">
        <div class="kc-idx">${r.index+1}</div>
        <div class="kc-track">
          <div class="kc-ideal" style="left:${idealL}%;width:${idealW}%"></div>
          <div class="kc-mid"></div>
          <div class="kc-bar" style="left:${pos}%;width:${Math.max(w,4)}%;background:${tone(c)};color:${c};border:1px solid ${c}">${r.lagMs>0?'+':''}${r.lagMs}</div>
        </div>
        <div class="kc-val" style="color:${c}">${ok?'✓':'✗'}</div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderRep(r,score){
  const s=score||scorePayloadRep(r);
  const sv=verdict("quality",s.total);
  const est=Math.round(r.armEstPeakDps??r.armPeakDps);
  const compBar=(label,val)=>{
    const c=val==null?"var(--faint)":val>=75?"var(--good)":val>=50?"var(--warn)":"var(--bad)";
    return `<div class="comp">
      <div class="comp-label">${label}</div>
      <div class="comp-track"><div class="comp-fill" style="width:${val??0}%;background:${c}"></div></div>
      <div class="comp-val num" style="color:${c}">${val!=null?val:'—'}</div>
    </div>`;
  };
  return `<div class="rep">
    <div class="rep-head">
      ${ringSVG(s.total,100,46,sv.color,s.total,"")}
      <div style="flex:1">
        <div class="rep-title">Remate ${r.index+1}</div>
        <div class="rep-sub">${r.armShape?cap(r.armShape):'gesto'} · ${r.armSaturated?`pico est. ${est}°/s`:`pico ${Math.round(r.armPeakDps)}°/s`}${s.capMax<99?` · nota máx. ${s.capMax}`:''}</div>
      </div>
    </div>
    <div class="comp-row">
      ${compBar("Potencia",s.power)}
      ${compBar("Cadena",s.chain)}
      ${compBar("Explosiv.",s.explosive)}
      ${compBar("Salto",s.jumpTiming)}
    </div>
    <div class="rep-stats">
      <div class="rstat"><div class="rk">Tronco</div><div class="rv num">${r.torsoPeakDps!=null?r.torsoPeakDps+'°/s':'—'}</div></div>
      <div class="rstat"><div class="rk">Lag</div><div class="rv num">${r.lagMs!=null?(r.lagMs>0?'+':'')+r.lagMs+'ms':'—'}</div></div>
      <div class="rstat"><div class="rk">Armado</div><div class="rv num">${r.armTimeToPeakMs!=null&&isFinite(r.armTimeToPeakMs)?Math.round(r.armTimeToPeakMs)+'ms':'—'}</div></div>
      ${r.jumpHeightCm!=null?`<div class="rstat"><div class="rk">Salto</div><div class="rv num">${r.jumpHeightCm}cm</div></div>`:''}
      ${r.contactInFlightPct!=null?`<div class="rstat"><div class="rk">Golpe en</div><div class="rv num">${r.contactInFlightPct}%</div></div>`:''}
    </div>
    <div class="rep-note">${escapeHtml(s.advice)}</div>
  </div>`;
}

/* ---------- gráfica ---------- */
function drawChart(traces){
  const cv=$("chart"); if(!cv) return;
  const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth||340, H=300;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+"px";
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  const pad={l:38,r:8,t:14,b:18};
  const arm=traces.arm, torso=traces.torso;
  const maxY=Math.max(2200,...arm.gyro,...(torso?torso.gyro:[0]));
  const n=arm.gyro.length;
  const X=i=>pad.l+(i/(n-1))*(W-pad.l-pad.r);
  const Y=v=>pad.t+(1-v/maxY)*(H-pad.t-pad.b);
  ctx.clearRect(0,0,W,H);
  // saturation zone (above 2000)
  ctx.fillStyle="rgba(229,72,77,.06)"; ctx.fillRect(pad.l,Y(maxY),W-pad.l-pad.r,Y(2000)-Y(maxY));
  // grid
  ctx.font="10px -apple-system,sans-serif"; ctx.textAlign="left";
  for(let g=0;g<=maxY;g+=500){const y=Y(g);ctx.strokeStyle="rgba(17,27,46,.06)";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    ctx.fillStyle="#94A0B6";ctx.fillText(g,2,y+3);}
  // saturation line
  ctx.strokeStyle="rgba(229,72,77,.5)";ctx.setLineDash([5,4]);ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(pad.l,Y(2000));ctx.lineTo(W-pad.r,Y(2000));ctx.stroke();ctx.setLineDash([]);
  const smooth=(pts)=>{ // catmull-rom -> path
    ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
    for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
      const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
      const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      ctx.bezierCurveTo(c1x,c1y,c2x,c2y,p2[0],p2[1]);}
  };
  const armPts=arm.gyro.map((v,i)=>[X(i),Y(v)]);
  // arm fill gradient
  smooth(armPts);ctx.lineTo(X(n-1),Y(0));ctx.lineTo(X(0),Y(0));ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.t,0,H);
  grad.addColorStop(0,"rgba(248,98,58,.34)");grad.addColorStop(1,"rgba(248,98,58,0)");
  ctx.fillStyle=grad;ctx.fill();
  // arm line
  smooth(armPts);ctx.strokeStyle="#F8623A";ctx.lineWidth=2.6;ctx.lineJoin="round";ctx.stroke();
  // torso line
  if(torso){const tp=torso.gyro.map((v,i)=>[X(i*(n-1)/(torso.gyro.length-1)),Y(v)]);
    smooth(tp);ctx.strokeStyle="#0FAE9F";ctx.lineWidth=2;ctx.stroke();}
  // peaks
  for(const pi of arm.peaks){if(pi>=0&&pi<n){const x=X(pi),y=Y(arm.gyro[pi]);
    ctx.beginPath();ctx.arc(x,y,5.5,0,7);ctx.fillStyle="#F8623A";ctx.fill();
    ctx.beginPath();ctx.arc(x,y,5.5,0,7);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();}}
}

/* ---------- ring SVG ---------- */
function ringSVG(val,max,size,color,centerBig,centerSmall){
  const sw=Math.max(4,Math.round(size*0.105));
  const r=(size-sw-2)/2, c=2*Math.PI*r, off=c*(1-Math.max(0,Math.min(1,val/max)));
  const fs=Math.round(size*0.33);
  return `<div class="ring" style="width:${size}px;height:${size}px;flex:0 0 auto">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(17,27,46,.09)" stroke-width="${sw}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    </svg>
    <div class="center"><div><div class="big num" style="font-size:${fs}px">${centerBig}</div>${centerSmall?`<div class="small">${centerSmall}</div>`:''}</div></div>
  </div>`;
}

function cap(s){return s? s.charAt(0).toUpperCase()+s.slice(1):s;}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}

init();
</script>
