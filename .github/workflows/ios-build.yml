name: iOS Build (sin firmar – AltStore)

on:
  workflow_dispatch:  # Se lanza manualmente desde GitHub Actions

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: Instalar Expo CLI
        run: npm install -g @expo/cli

      - name: Generar proyecto iOS nativo (prebuild)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Instalar CocoaPods
        working-directory: ios
        run: pod install

      - name: Compilar archivo sin firmar
        working-directory: ios
        run: |
          xcodebuild archive \
            -workspace RemateVoley.xcworkspace \
            -scheme RemateVoley \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/RemateVoley.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -destination "generic/platform=iOS"

      - name: Empaquetar como .ipa
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$RUNNER_TEMP/RemateVoley.xcarchive/Products/Applications/RemateVoley.app" \
            "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r "RemateVoley-unsigned.ipa" Payload/

      - name: Subir .ipa como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: RemateVoley-unsigned
          path: ${{ runner.temp }}/RemateVoley-unsigned.ipa
          retention-days: 14
